services:
  - type: web
    name: ai-kakeibo-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-kakeibo-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: ai-kakeibo-db
    plan: free
